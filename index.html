<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إلى سامية 💜</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Cairo', sans-serif; color: white; touch-action: manipulation; }
        canvas { position: fixed; inset: 0; z-index: 1; }
        
        #ui-wrapper { 
            position: fixed; inset: 0; z-index: 100; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            padding: 15px; text-align: center; 
        }

        .glass-card { 
            background: rgba(10, 5, 25, 0.95); backdrop-filter: blur(15px); 
            border: 2px solid #8a2be2; padding: 25px; border-radius: 20px; 
            width: 90%; max-height: 85vh; overflow-y: auto;
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.5);
        }

        h1 { font-size: 32px; margin-bottom: 10px; color: #fff; }
        p { font-size: 22px; line-height: 1.6; margin: 10px 0; }

        #typewriter { 
            font-size: 23px; 
            line-height: 1.7; 
            font-weight: bold;
            color: #f0e6ff;
            text-align: right;
            direction: rtl;
        }

        .btn { 
            background: #8a2be2; border: none; color: #fff; 
            padding: 15px 35px; border-radius: 50px; cursor: pointer; 
            font-size: 20px; margin-top: 15px; font-weight: bold;
        }

        #portal { 
            display: none; 
            flex-direction: column;
            align-items: center;
            margin-top: 25px; 
            cursor: pointer; 
        }
        .core { 
            width: 100px; height: 100px; border-radius: 50%; 
            box-shadow: 0 0 50px #8a2be2, 0 0 80px #fff; 
            animation: pulse 1.5s infinite; 
            background: #000; border: 2px solid #fff;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }

        #final-text { 
            position: fixed; inset: 0; z-index: 200; display: none; 
            justify-content: center; align-items: center; 
            font-size: 38px; font-weight: bold; text-align: center;
            text-shadow: 0 0 30px #8a2be2; padding: 20px;
            animation: float 5s infinite ease-in-out;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
    </style>
</head>
<body>

    <audio id="music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3" type="audio/mpeg">
    </audio>

    <div id="ui-wrapper">
        <div class="glass-card" id="s1">
            <h1>Welcome Samia</h1>
            <p>Welcome to a world of my creation</p>
            <button class="btn" onclick="go(1,2)">Enter</button>
        </div>

        <div class="glass-card" id="s2" style="display:none">
            <p>مرحباً، هذا صنع في اليوم 2026.4.12... مصنوع بيد شخص رخص وقته ليعبر لكِ عما في قلبه.</p>
            <button class="btn" onclick="go(2,3)">التالي</button>
        </div>

        <div class="glass-card" id="s3" style="display:none">
            <p style="font-size: 28px; font-weight: bold;">أولاً سأقول لكِ شيئاً..</p>
            <button class="btn" onclick="go(3,4)">استمر</button>
        </div>

        <div class="glass-card" id="s4" style="display:none">
            <div id="typewriter"></div>
            <div id="portal" onclick="startJourney()">
                <div class="core"></div>
                <p style="font-size: 24px; margin-top: 10px; font-weight: bold;">صافري</p>
            </div>
        </div>
    </div>

    <div id="final-text">That’s all there is, my dear.</div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
        let scene, camera, renderer, stars, moving = false, clock = new THREE.Clock();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 30000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            const geo = new THREE.BufferGeometry();
            const pos = [];
            // نجوم كثيفة جداً (200,000)
            for(let i=0; i<200000; i++) {
                pos.push(THREE.MathUtils.randFloatSpread(25000), THREE.MathUtils.randFloatSpread(25000), THREE.MathUtils.randFloatSpread(25000));
            }
            geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
            stars = new THREE.Points(geo, new THREE.PointsMaterial({ color: 0x8a2be2, size: 2.5, transparent: true }));
            scene.add(stars);
            camera.position.z = 4000;
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            stars.rotation.y += 0.0004;
            if (moving) {
                let t = clock.getElapsedTime();
                if (t < 30) { 
                    camera.position.z -= 30; 
                    if (t > 15) stars.material.color.setHex(0x00ff88);
                } else {
                    moving = false;
                    document.getElementById('final-text').style.display = 'flex';
                }
            }
            renderer.render(scene, camera);
        }

        window.go = (o, n) => {
            document.getElementById(`s${o}`).style.display = 'none';
            document.getElementById(`s${n}`).style.display = 'block';
            if(n === 4) type();
        }

        function type() {
            const msg = "شوفي بغيت نقول لك هادشي لدجا قولتو لك مرات بزاف نتي عارفا بلي أنا كنبغيك امكن وعارفة كولشي أو وضحت لك نيتي أو مهم راك عارفة كل شيء ولكن راك مبغيتش تعرفي والو مبغيتش تعرفي بلي كنبغيك صراحة بديت كنبغيك من نهار تلاقيتك دك نهار في مدينة معندي مدنير كنكره هاكا مباغيش نتصاحب باغي نبقا طنروكيل، أصلا ماشي عيب تبغي شي حد يك المهم لحاجة لباغي دجا قلته لك نبقاو ديما على تواصل واخة تكوني نتي مباغيانيش ، انبغيك بحال ختي أو نتي بغيني بحال خوك .";
            let i = 0;
            const container = document.getElementById('typewriter');
            function t() {
                if(i < msg.length) { 
                    container.innerHTML += msg.charAt(i); i++; setTimeout(t, 40); 
                } else {
                    document.getElementById('portal').style.display = 'flex';
                }
            }
            t();
        }

        window.startJourney = () => {
            moving = true; clock.start();
            document.getElementById('music').play();
            document.getElementById('ui-wrapper').style.display = 'none';
        }

        init();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
