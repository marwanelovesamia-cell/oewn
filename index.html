<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infinity Journey - Samia</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Cairo', sans-serif; color: white; touch-action: none; }
        canvas { position: fixed; inset: 0; z-index: 1; }

        #ui-wrapper {
            position: fixed; inset: 0; z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 10px;
        }

        .glass-card {
            background: rgba(10, 5, 20, 0.9); backdrop-filter: blur(15px);
            border: 2px solid #8a2be2; padding: 25px; border-radius: 20px; 
            text-align: center; width: 92%; max-width: 450px;
            box-shadow: 0 0 40px rgba(138, 43, 226, 0.6);
            max-height: 80vh; overflow-y: auto; /* لمنع خروج النص في الهواتف الصغيرة */
        }

        h1 { font-size: 32px; margin: 10px 0; }
        p { font-size: 19px; line-height: 1.5; }

        #typewriter { 
            font-size: 20px; 
            line-height: 1.7; 
            color: #fff; 
            min-height: 80px; 
            text-align: right; 
            direction: rtl;
        }

        .btn {
            background: #8a2be2; border: none; color: #fff;
            padding: 12px 35px; border-radius: 50px; cursor: pointer;
            font-size: 18px; margin-top: 20px; font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        #portal-container {
            display: none; flex-direction: column; align-items: center; cursor: pointer; margin-top: 25px;
        }
        .wormhole-core {
            width: 100px; height: 100px; background: #000; border-radius: 50%;
            box-shadow: 0 0 50px #8a2be2, 0 0 80px #fff;
            position: relative; animation: pulse 1.8s infinite ease-in-out;
            border: 2px solid #fff;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }

        #final-text {
            position: fixed; inset: 0; z-index: 200; display: none;
            justify-content: center; align-items: center; text-align: center;
            font-size: 35px; font-weight: bold; pointer-events: none;
            text-shadow: 0 0 30px #8a2be2, 0 0 50px #fff;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div id="ui-wrapper">
        <div class="glass-card" id="scr1">
            <h1>Welcome Samia</h1>
            <p>Welcome to a world of my creation</p>
            <button class="btn" onclick="next(1,2)">Enter</button>
        </div>
        <div class="glass-card" id="scr2" style="display:none">
            <p>مرحباً، هذا صنع في اليوم 2026.4.12... مصنوع بيد شخص رخص وقته ليعبر لكِ عما في قلبه.</p>
            <button class="btn" onclick="next(2,3)">التالي</button>
        </div>
        <div class="glass-card" id="scr3" style="display:none">
            <p style="font-size: 26px; font-weight: bold;">أولاً سأقول لكِ شيئاً..</p>
            <button class="btn" onclick="next(3,4)">استمر</button>
        </div>
        <div class="glass-card" id="scr4" style="display:none">
            <div id="typewriter"></div>
            <div id="portal-container" onclick="launchSpaceMission()">
                <div class="wormhole-core"></div>
                <p style="margin-top: 15px; font-weight: bold; font-size: 22px;">صافري</p>
            </div>
        </div>
    </div>

    <div id="final-text">That’s all there is, my dear.</div>

    <script type="importmap"> { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } } </script>

    <script type="module">
        import * as THREE from 'three';

        let scene, camera, renderer, starSystem, wormholeMesh, galaxyMesh;
        let isTraveling = false, clock = new THREE.Clock();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 25000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // تحسين الأداء للهواتف
            document.body.appendChild(renderer.domElement);

            // 1. نجوم أكثر عدداً وسطوعاً (150,000 نجمة)
            const geo = new THREE.BufferGeometry();
            const pos = [];
            for(let i=0; i<150000; i++) {
                pos.push(THREE.MathUtils.randFloatSpread(12000), THREE.MathUtils.randFloatSpread(12000), THREE.MathUtils.randFloatSpread(10000));
            }
            geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
            starSystem = new THREE.Points(geo, new THREE.PointsMaterial({ 
                color: 0x8a2be2, 
                size: 2.5, 
                transparent: true,
                blending: THREE.AdditiveBlending // يجعلها تلمع عند التقاطع
            }));
            scene.add(starSystem);

            // 2. نفق دودي
            const tunnelGeo = new THREE.CylinderGeometry(60, 60, 8000, 32, 1, true);
            const tunnelMat = new THREE.MeshBasicMaterial({ color: 0x443355, wireframe: true, transparent: true, opacity: 0, side: THREE.BackSide });
            wormholeMesh = new THREE.Mesh(tunnelGeo, tunnelMat);
            wormholeMesh.rotation.x = Math.PI / 2;
            scene.add(wormholeMesh);

            // 3. المجرة النهائية
            const galGeo = new THREE.TorusKnotGeometry(50, 15, 150, 16);
            const galMat = new THREE.MeshNormalMaterial({ transparent: true, opacity: 0 });
            galaxyMesh = new THREE.Mesh(galGeo, galMat);
            scene.add(galaxyMesh);

            camera.position.z = 2500;
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            starSystem.rotation.y += 0.0005;

            if (isTraveling) {
                const time = clock.getElapsedTime();

                if (time < 10) {
                    camera.position.z -= 4;
                    wormholeMesh.material.opacity = 0.3;
                    wormholeMesh.rotation.y += 0.03;
                    starSystem.material.color.setHSL(0.7, 0.5, 0.4);
                }
                else if (time < 20) {
                    wormholeMesh.material.opacity -= 0.01;
                    starSystem.material.color.setHex(0x00ff88); // أخضر فاقع
                    camera.position.z -= 5;
                }
                else if (time < 30) {
                    galaxyMesh.material.opacity = 0.8;
                    galaxyMesh.rotation.x += 0.04;
                    galaxyMesh.rotation.y += 0.04;
                    galaxyMesh.scale.set(time*0.5, time*0.5, time*0.5);
                    starSystem.material.color.setHSL((time * 0.1) % 1, 0.8, 0.6);
                    camera.position.z -= 25;
                }
                else {
                    endAll();
                }
            }
            renderer.render(scene, camera);
        }

        window.next = (oldS, newS) => {
            document.getElementById(`scr${oldS}`).style.display = 'none';
            document.getElementById(`scr${newS}`).style.display = 'block';
            if(newS === 4) typeText();
        }

        function typeText() {
            const msg = "شوفي بغيت نقول لك هادشي لدجا قولتو لك مرات بزاف نتي عارفا بلي أنا كنبغيك امكن وعارفة كولشي أو وضحت لك نيتي أو مهم راك عارفة كل شيء ولكن راك مبغيتش تعرفي والو مبغيتش تعرفي بلي كنبغيك صراحة بديت كنبغيك من نهار تلاقيتك دك نهار في مدينة معندي مدنير كنكره هاكا مباغيش نتصاحب باغي نبقا طنروكيل، أصلا ماشي عيب تبغي شي حد يك المهم لحاجة لباغي دجا قلته لك نبقاو ديما على تواصل واخة تكوني نتي مباغيانيش ، انبغيك بحال ختي أو نتي بغيني بحال خوك (كنحس بلي أنا درامي ناري مهم فهمي شنو بغيت نوصل لك اوصفي ) .";
            let i = 0;
            const container = document.getElementById('typewriter');
            function type() {
                if (i < msg.length) { container.innerHTML += msg.charAt(i); i++; setTimeout(type, 35); }
                else document.getElementById('portal-container').style.display = 'flex';
            }
            type();
        }

        window.launchSpaceMission = () => {
            isTraveling = true;
            clock.start();
            document.getElementById('ui-wrapper').style.transition = '1s';
            document.getElementById('ui-wrapper').style.opacity = '0';
            setTimeout(() => { document.getElementById('ui-wrapper').style.display = 'none'; }, 1000);
        }

        function endAll() {
            isTraveling = false;
            camera.position.set(0, 0, 2000);
            document.getElementById('final-text').style.display = 'flex';
        }

        init();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
