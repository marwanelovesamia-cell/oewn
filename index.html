<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى سامية 💜</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Cairo', sans-serif; color: white; touch-action: none; }
        canvas { position: fixed; inset: 0; z-index: 1; }
        
        #ui-wrapper { 
            position: fixed; inset: 0; z-index: 100; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            padding: 20px; text-align: center; 
        }

        .glass-card { 
            background: rgba(10, 5, 25, 0.9); backdrop-filter: blur(15px); 
            border: 2px solid #8a2be2; padding: 30px; border-radius: 25px; 
            width: 90%; max-width: 500px; box-shadow: 0 0 40px rgba(138, 43, 226, 0.4);
        }

        h1 { font-size: 35px; margin-bottom: 10px; }
        p { font-size: 20px; line-height: 1.6; }

        #typewriter { 
            font-size: 24px; /* خط كبير للهاتف */
            line-height: 1.8; 
            min-height: 150px; 
            font-weight: bold;
            color: #f0e6ff;
        }

        .btn { 
            background: #8a2be2; border: none; color: #fff; 
            padding: 15px 40px; border-radius: 50px; cursor: pointer; 
            font-size: 22px; margin-top: 20px; font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        #portal { display: none; margin-top: 30px; cursor: pointer; }
        .core { 
            width: 120px; height: 120px; border-radius: 50%; 
            box-shadow: 0 0 60px #8a2be2, 0 0 100px #fff; 
            animation: pulse 1.5s infinite; margin: auto; 
            background: #000;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.2); opacity: 1; } }

        #final-text { 
            position: fixed; inset: 0; z-index: 200; display: none; 
            justify-content: center; align-items: center; 
            font-size: 40px; font-weight: bold; text-align: center;
            text-shadow: 0 0 30px #8a2be2, 0 0 50px #fff; 
            padding: 20px; line-height: 1.4;
            animation: float 5s infinite ease-in-out;
        }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-30px); } }
    </style>
</head>
<body>

    <audio id="music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3" type="audio/mpeg">
    </audio>

    <div id="ui-wrapper">
        <div class="glass-card" id="s1">
            <h1>Welcome Samia</h1>
            <button class="btn" onclick="go(1,2)">Enter</button>
        </div>
        <div class="glass-card" id="s2" style="display:none">
            <p>مرحباً، هذا صنع في اليوم 2026.4.12... مصنوع بيد شخص رخص وقته ليعبر لكِ عما في قلبه.</p>
            <button class="btn" onclick="go(2,3)">التالي</button>
        </div>
        <div class="glass-card" id="s3" style="display:none">
            <div id="typewriter"></div>
            <div id="portal" onclick="startJourney()">
                <div class="core"></div>
                <p style="font-size: 25px; margin-top: 15px; font-weight: bold;">صافري</p>
            </div>
        </div>
    </div>

    <div id="final-text">That’s all there is, my dear.</div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.160.0/build/three.module.js';
        let scene, camera, renderer, stars, moving = false, clock = new THREE.Clock();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 30000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            const geo = new THREE.BufferGeometry();
            const pos = [];
            // زيادة عدد النجوم بشكل ضخم (200,000 نجمة)
            for(let i=0; i<200000; i++) {
                pos.push(THREE.MathUtils.randFloatSpread(20000), THREE.MathUtils.randFloatSpread(20000), THREE.MathUtils.randFloatSpread(20000));
            }
            geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
            stars = new THREE.Points(geo, new THREE.PointsMaterial({ 
                color: 0x8a2be2, 
                size: 3, 
                transparent: true, 
                blending: THREE.AdditiveBlending 
            }));
            scene.add(stars);
            camera.position.z = 3000;
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            stars.rotation.y += 0.0005;
            stars.rotation.x += 0.0002;

            if (moving) {
                let t = clock.getElapsedTime();
                if (t < 30) { 
                    camera.position.z -= 25; 
                    if (t > 15) stars.material.color.setHex(0x00ff88);
                } else {
                    moving = false;
                    document.getElementById('final-text').style.display = 'flex';
                }
            }
            renderer.render(scene, camera);
        }

        window.go = (o, n) => {
            document.getElementById(`s${o}`).style.display = 'none';
            document.getElementById(`s${n}`).style.display = 'block';
            if(n === 3) type();
        }

        function type() {
            const msg = "شوفي بغيت نقول لك هادشي لدجا قولتو لك مرات بزاف نتي عارفا بلي أنا كنبغيك امكن وعارفة كولشي أو وضحت لك نيتي أو مهم راك عارفة كل شيء ولكن راك مبغيتش تعرفي والو مبغيتش تعرفي بلي كنبغيك صراحة بديت كنبغيك من نهار تلاقيتك دك نهار في مدينة معندي مدنير كنكره هاكا مباغيش نتصاحب باغي نبقا طنروكيل، أصلا ماشي عيب تبغي شي حد يك المهم لحاجة لباغي دجا قلته لك نبقاو ديما على تواصل واخة تكوني نتي مباغيانيش ، انبغيك بحال ختي أو نتي بغيني بحال خوك .";
            let i = 0;
            function t() {
                if(i < msg.length) { 
                    document.getElementById('typewriter').innerHTML += msg.charAt(i); 
                    i++; 
                    setTimeout(t, 45); 
                } else {
                    document.getElementById('portal').style.display = 'block';
                }
            }
            t();
        }

        window.startJourney = () => {
            moving = true; clock.start();
            document.getElementById('music').play();
            document.getElementById('ui-wrapper').style.display = 'none';
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
